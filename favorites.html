<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Моя барная карта — избранные рецепты коктейля Негрони из Музея Негрони. Экспорт списка и управление коллекцией.">
  <title>Избранное — Музей Негрони</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/collection.css">
  <link rel="stylesheet" href="styles/favorites.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">Музей Негрони</a>
    <nav class="nav">
      <a href="index.html#about" data-i18n="nav.about">О проекте</a>
      <a href="collection.html" data-i18n="nav.collection">Коллекция</a>
      <a href="history.html" data-i18n="nav.history">История</a>
      <a href="partners.html" data-i18n="nav.partners">Партнёры</a>
      <a href="favorites.html" class="nav-favorites-link active" aria-label="Избранное">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>
      <button type="button" class="theme-toggle-btn nav-icon-btn" aria-label="Переключить тему"></button>
      <button type="button" class="lang-toggle-btn nav-icon-btn" aria-label="Сменить язык">EN</button>
      <a href="recipes.html" class="btn-recipes" data-i18n="nav.map">Карта</a>
    </nav>
  </header>

  <main class="favorites-page">
    <header class="favorites-header reveal">
      <div>
        <h1 class="favorites-title" data-i18n="favorites.title">Моя барная карта</h1>
        <p class="favorites-subtitle" data-i18n="favorites.subtitle">Рецепты, которые вы сохранили для быстрого доступа.</p>
      </div>
      <div class="favorites-actions">
        <button type="button" id="exportFavoritesBtn" class="btn-ghost" data-i18n="favorites.export">Экспортировать список</button>
        <button type="button" id="clearFavoritesBtn" class="btn-ghost" data-i18n="favorites.clear">Очистить всё</button>
      </div>
    </header>

    <section id="favoritesGrid" class="favorites-grid" aria-live="polite"></section>

    <div id="favoritesEmpty" class="favorites-empty" hidden>
      <div class="favorites-empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.4"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <p class="favorites-empty-text" data-i18n="favorites.empty">Вы ещё не добавили ни одного рецепта в избранное.</p>
      <a href="collection.html" class="favorites-empty-link" data-i18n="favorites.goToCollection">Перейти к коллекции &rarr;</a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a href="index.html" class="footer-logo">Музей Негрони</a>
      <p data-i18n="footer.rights">© 2025 Музей Негрони. Все права защищены.</p>
    </div>
  </footer>

  <script src="scripts/data.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/analytics.js"></script>
  <script src="scripts/theme.js"></script>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/reveal.js"></script>
  <script src="scripts/favorites.js"></script>
</body>
</html>
